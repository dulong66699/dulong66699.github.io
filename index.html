<!DOCTYPE>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
	img{
		position: absolute;
	}
	body{
		background-color: black;
	}
</style>
<script type="text/javascript" 
	src="jquery-1.4.2.min.js"></script>
<script type="text/javascript">
	setInterval(function(){
		var w = 
			document.body.parentElement.clientWidth;
		var h = 
			document.body.parentElement.clientHeight;
		
		var img = $("<img src='snow.png'>");
		//设置雪花尺寸20-40随机
		var x = Math.floor(Math.random()*20)+20+"px";
		var left = Math.floor(Math.random()*(w-parseInt(x)))+"px";
		img.css({"width":x,"height":x,
			"left":left});
		//让雪花移动到屏幕最下方
		 img.animate({"top":h-parseInt(x)+"px"},
				 	2000+Math.floor(Math.random()*2000));
		$(document.body).append(img);
		$("img").hover(function(){$(this).fadeOut(10);});
	},100);
</script>
</head>
<body>
<div><img src="./timg.jpg" alt="" id="im"></div>
<iframe src="https://player.bilibili.com/player.html?aid=928861104&bvid=BV1uT4y1P7CX&cid=287639008&page=1" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true" style="width:100%;height:100%;length:100%;size:100%;"> </iframe>
<iframe src="https://player.bilibili.com/player.html?aid=80433022&bvid=BV1GJ411x7h7&cid=137649199&page=1" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true" style="width:100%;height:100%;length:100%;size:100%";> </iframe>
</body>
</html>
